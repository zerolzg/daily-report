<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经数据</title>
    <link rel="icon" href="./favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">财经数据</h1>
            <button id="themeToggle" class="theme-toggle" aria-label="切换主题">
                <span class="theme-icon">🌙</span>
            </button>
        </header>

        <main class="main">
            <div class="card-grid">
                <div class="card">
                    <div id="chart" class="chart"></div>
                </div>
                <div class="card">
                    <div id="china-heatmap" class="china-heatmap">
                        <div class="card-header">
                            <div class="card-title">热门中概股行情一览</div>
                            <div class="card-subtitle">数据更新中...</div>
                        </div>
                        <div id="china-heatmap-content" class="heatmap-content">
                            <div class="loading">加载中...</div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div id="us-heatmap" class="us-heatmap">
                        <div class="card-header">
                            <div class="card-title">美股热门股票行情一览</div>
                            <div class="card-subtitle">数据更新中...</div>
                        </div>
                        <div id="heatmap-content" class="heatmap-content">
                            <div class="loading">加载中...</div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div id="global-review" class="global-review">
                        <div class="card-header">
                            <div class="card-title">隔日全球走势回顾</div>
                            <div class="card-subtitle">数据更新中...</div>
                        </div>
                        <div id="review-content" class="review-content">
                            <div class="loading">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@6.0/dist/echarts.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
